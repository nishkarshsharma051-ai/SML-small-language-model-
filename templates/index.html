<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ting Ling Ling — Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">Ting Ling Ling</div>
      <button class="icon-btn" id="newChatBtn" title="New Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <div class="sidebar-section-label">Prompts</div>
    <nav class="topic-nav">
      <button class="topic-btn" data-q="Explain recursion in programming">Recursion</button>
      <button class="topic-btn" data-q="Teach me the chain rule step by step">Calculus</button>
      <button class="topic-btn" data-q="Explain object-oriented programming">OOP</button>
      <button class="topic-btn" data-q="Explain linear algebra basics">Linear Algebra</button>
    </nav>

    <div class="sidebar-footer">
      <div class="voice-selector">
        <span class="voice-label">Voice</span>
        <select id="voiceSelect" class="voice-select">
          <option value="daniel">Daniel</option>
          <option value="reed">Reed</option>
          <option value="rocko">Rocko</option>
          <option value="grandpa">Grandpa</option>
          <option value="eddy">Eddy</option>
          <option value="fred">Fred</option>
        </select>
      </div>

      <div class="voice-chat-config">
        <label class="check-row">
          <input type="checkbox" id="autoSpeakToggle">
          <span>Auto speak</span>
        </label>
      </div>

      <div class="voice-rate">
        <span class="rate-label">Speed: <span id="rateValue">175</span></span>
        <input type="range" id="voiceRate" class="rate-slider" min="100" max="350" value="175" step="1">
      </div>
    </div>
  </aside>

  <!-- Main Area -->
  <main class="main">
    <header class="topbar">
      <button class="icon-btn" id="toggleSidebar" title="Toggle Sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="topbar-center">
        <span class="model-badge">Assistant v1.0</span>
        <button class="voice-assistant-toggle" id="voiceAssistantBtn">
          Voice Assistant
        </button>
        <button class="stop-btn hidden" id="stopSpeechBtn">
          Stop
        </button>
      </div>
      <div class="status-dot" id="statusDot"></div>
    </header>

    <div class="chat-window" id="chatWindow">
      <div class="welcome" id="welcomeScreen">
        <h1 class="welcome-title">Ting Ling Ling</h1>
        <p class="welcome-subtitle">A minimal interface for your language model.</p>
        <div class="suggestion-chips">
          <button class="chip" onclick="sendSuggestion('Explain the chain rule')">Chain rule</button>
          <button class="chip" onclick="sendSuggestion('Explain recursion')">Recursion</button>
          <button class="chip" onclick="sendSuggestion('Explain OOP')">OOP</button>
          <button class="chip" onclick="sendSuggestion('Explain linear algebra')">Linear algebra</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <textarea
          id="userInput"
          class="user-input"
          placeholder="Type a message..."
          rows="1"
          autofocus
        ></textarea>
        <div class="input-actions">
          <button class="send-btn" id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
      <p class="disclaimer">Ting Ling Ling may make mistakes. Verify information.</p>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
