<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ting Ling Ling — Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
</head>
<body>
  <div class="ambient-canvas">
    <div class="blob blob-purple"></div>
    <div class="blob blob-blue"></div>
    <div class="blob blob-indigo"></div>
  </div>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">Ting Ling Ling</div>
      <button class="icon-btn" id="newChatBtn" title="New Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <div class="sidebar-section-label">Prompts</div>
    <nav class="topic-nav">
      <button class="topic-btn" data-q="Explain recursion in programming">Recursion</button>
      <button class="topic-btn" data-q="Teach me the chain rule step by step">Calculus</button>
      <button class="topic-btn" data-q="Explain Dynamic Programming">Dynamic Programming</button>
      <button class="topic-btn" data-q="What is System Design?">System Design</button>
    </nav>

    <div class="sidebar-footer">
      <div class="voice-selector">
        <span class="voice-label">Voice</span>
        <select id="voiceSelect" class="voice-select">
          <option value="daniel">Daniel</option>
          <option value="reed">Reed</option>
          <option value="rocko">Rocko</option>
          <option value="grandpa">Grandpa</option>
          <option value="eddy">Eddy</option>
          <option value="fred">Fred</option>
        </select>
      </div>

      <div class="voice-chat-config">
        <label class="check-row">
          <input type="checkbox" id="autoSpeakToggle">
          <span>Auto speak</span>
        </label>
      </div>

      <div class="voice-rate">
        <span class="rate-label">Speed: <span id="rateValue">175</span></span>
        <input type="range" id="voiceRate" class="rate-slider" min="100" max="350" value="175" step="1">
      </div>
    </div>
  </aside>

  <!-- Main Area -->
  <main class="main">
    <header class="topbar">
      <button class="icon-btn" id="toggleSidebar" title="Toggle Sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="topbar-center">
        <span class="model-badge">Assistant v1.0</span>
        <button class="voice-assistant-toggle" id="voiceAssistantBtn">
          Voice Assistant
        </button>
        <div class="voice-visualizer" id="voiceVisualizer">
          <div class="visualizer-bar"></div>
          <div class="visualizer-bar"></div>
          <div class="visualizer-bar"></div>
          <div class="visualizer-bar"></div>
          <div class="visualizer-bar"></div>
        </div>
        <button class="stop-btn hidden" id="stopSpeechBtn">
          Stop
        </button>
      </div>
      <div class="status-dot" id="statusDot"></div>
    </header>

    <div class="chat-window" id="chatWindow">
      <div class="welcome" id="welcomeScreen">
        <h1 class="welcome-title">Ting Ling Ling</h1>
        <p class="welcome-subtitle">A powerful, local-first intelligence at your fingertips. How can I help you today?</p>
        <div class="suggestion-chips">
          <button class="chip" onclick="sendSuggestion('Explain Quantum Computing simply')">
            <svg style="width:16px;height:16px;margin-right:8px;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            Quantum Computing
          </button>
          <button class="chip" onclick="sendSuggestion('How to build a neural network from scratch?')">
            <svg style="width:16px;height:16px;margin-right:8px;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
            Neural Networks
          </button>
          <button class="chip" onclick="sendSuggestion('Best practices for System Design')">
            <svg style="width:16px;height:16px;margin-right:8px;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M9 3v18M15 3v18"/></svg>
            System Design
          </button>
        </div>
      </div>

      <div class="messages" id="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <textarea
          id="userInput"
          class="user-input"
          placeholder="Type a message..."
          rows="1"
          autofocus
        ></textarea>
        <div class="input-actions">
          <button class="icon-btn action-icon-btn" id="micBtn" title="Talk to Ting Ling Ling">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button class="icon-btn action-icon-btn" id="speakerToggleBtn" title="Toggle Voice Response">
            <svg id="speakerOnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <svg id="speakerOffIcon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
          </button>
          <button class="send-btn" id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
      <p class="disclaimer">Ting Ling Ling may make mistakes. Verify information.</p>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
