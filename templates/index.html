<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ting Ling Ling — Study AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <!-- KaTeX for High-Fidelity Math Rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <span>T</span><span class="logo-accent">L</span>
        </div>
        <span class="logo-text">Ting Ling Ling</span>
      </div>
      <button class="icon-btn" id="newChatBtn" title="New Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <div class="sidebar-section-label">Study Topics</div>
    <nav class="topic-nav">
      <button class="topic-btn" data-q="Explain calculus derivatives step by step with examples">📐 Calculus</button>
      <button class="topic-btn" data-q="Teach me quadratic equations with examples">📊 Algebra</button>
      <button class="topic-btn" data-q="Explain the causes of World War 2">🌍 History</button>
      <button class="topic-btn" data-q="Explain the French Revolution and its impact">🏰 World History</button>
      <button class="topic-btn" data-q="Explain grammar rules: tenses and punctuation">✍️ English Grammar</button>
      <button class="topic-btn" data-q="How do I write a good essay? Give me a structure">📝 Essay Writing</button>
      <button class="topic-btn" data-q="Explain the Pythagorean theorem with examples">📏 Geometry</button>
      <button class="topic-btn" data-q="Explain trigonometry: sin, cos, tan with examples">📡 Trigonometry</button>
    </nav>

    <div class="sidebar-footer">
      <div class="voice-selector">
        <span class="voice-label">🎙️ Voice</span>
        <select id="voiceSelect" class="voice-select">
          <option value="daniel">Daniel (British)</option>
          <option value="reed">Reed (US)</option>
          <option value="rocko">Rocko (Deep)</option>
          <option value="grandpa">Grandpa (Warm)</option>
          <option value="eddy">Eddy (Clear)</option>
          <option value="fred">Fred (Classic)</option>
        </select>
      </div>

      <div class="voice-rate">
        <div class="rate-header">
          <span class="rate-label">⚡ Speed</span>
          <span id="rateValue" class="rate-value">175</span>
        </div>
        <input type="range" id="voiceRate" class="rate-slider" min="100" max="350" value="175" step="1">
      </div>
    </div>
  </aside>

  <!-- Main Area -->
  <main class="main">
    <!-- Topbar -->
    <header class="topbar">
      <button class="icon-btn" id="toggleSidebar" title="Toggle Sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="topbar-center">
        <span class="model-badge">Ting Ling Ling · Study AI · v1.0</span>
        <button class="stop-btn hidden" id="stopSpeechBtn" title="Stop Speaking">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          Stop Speaking
        </button>
      </div>
      <div class="status-dot" id="statusDot" title="Model status"></div>
    </header>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
      <!-- Welcome Screen -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-avatar">
          <div class="avatar-glow"></div>
          <div class="avatar-icon">TL</div>
        </div>
        <h1 class="welcome-title">Hello, I'm <span class="gradient-text">Ting Ling Ling</span></h1>
        <p class="welcome-subtitle">Your personal study assistant. Ask me anything about<br/>
          <strong>Mathematics · History · English · Science</strong>
        </p>
        <div class="suggestion-chips">
          <button class="chip" onclick="sendSuggestion('What is the derivative of x² + 3x?')">What is the derivative of x² + 3x?</button>
          <button class="chip" onclick="sendSuggestion('When did World War 2 end and why?')">When did World War 2 end and why?</button>
          <button class="chip" onclick="sendSuggestion('Explain the difference between simile and metaphor')">Simile vs Metaphor?</button>
          <button class="chip" onclick="sendSuggestion('Solve: 2x² - 5x + 3 = 0')">Solve: 2x² - 5x + 3 = 0</button>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages" id="messages"></div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-container">
        <textarea
          id="userInput"
          class="user-input"
          placeholder="Ask Ting Ling Ling anything..."
          rows="1"
          autofocus
        ></textarea>
        <div class="input-actions">
          <button class="send-btn" id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
      <p class="disclaimer">Ting Ling Ling may make mistakes. Verify important information.</p>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
